<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Preview Test</title>
    <style>
        body {
            margin: 0;
            padding: 24px;
            font-family: Arial, sans-serif;
            background: #f5f7fb;
        }

        .card {
            max-width: 420px;
            margin: 40px auto;
            background: #fff;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
        }

        label {
            display: block;
            margin-bottom: 12px;
            font-size: 16px;
            font-weight: 600;
            color: #1f2937;
        }

        input[type="file"] {
            width: 100%;
        }

        img {
            display: none;
            width: 120px;
            height: 120px;
            margin-top: 16px;
            object-fit: cover;
            border: 1px solid #d0d7e2;
            border-radius: 10px;
            background: #fff;
        }
    </style>
</head>
<body>
    <div class="card">
        <label for="image-upload">Upload image</label>
        <input id="image-upload" type="file" accept="image/*">
        <img id="uploaded-image" alt="Uploaded image preview">
    </div>

    <script>
        function isPreviewableImage(file) {
            var imageNamePattern = /\.(jpg|jpeg|png|gif|bmp|webp)$/i;
            if (file.type && file.type.indexOf("image/") === 0) {
                return true;
            }

            return imageNamePattern.test(file.name || "");
        }

        function showInvalidImageMessage() {
            if (typeof Android !== "undefined" && Android.showToast) {
                Android.showToast("Please upload a valid image file");
            } else {
                alert("Please upload a valid image file");
            }
        }

        function loadImage(fileObject) {
            if (fileObject.files && fileObject.files[0]) {
                var file = fileObject.files[0];
                var previewImage = document.getElementById("uploaded-image");

                if (!isPreviewableImage(file)) {
                    fileObject.value = "";
                    previewImage.removeAttribute("src");
                    previewImage.style.display = "none";
                    showInvalidImageMessage();
                    return;
                }

                var reader = new FileReader();
                reader.onload = function(e) {
                    previewImage.onload = function() {
                        previewImage.style.display = "block";
                    };
                    previewImage.onerror = function() {
                        fileObject.value = "";
                        previewImage.removeAttribute("src");
                        previewImage.style.display = "none";
                        showInvalidImageMessage();
                    };
                    previewImage.src = e.target.result;
                };
                reader.readAsDataURL(file);
            }
        }

        document.getElementById("image-upload").addEventListener("change", function() {
            loadImage(this);
        });
    </script>
</body>
</html>
